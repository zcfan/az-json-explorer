<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      * { box-sizing: border-box; }
      html, body {
        width: 440px;
        height: 280px;
        margin: 0;
        overflow: hidden;
        color: #111827;
        background: #f6f7f9;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .stage {
        position: relative;
        width: 100%;
        height: 100%;
        padding: 24px;
        background: linear-gradient(90deg, #ffffff 0 55%, #eef6ff 55% 100%);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 18px;
        color: #475467;
        font-weight: 700;
      }
      .mini-logo {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border-radius: 14px;
        color: #ffffff;
        background: #2563eb;
        font: 800 16px/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        box-shadow: inset 0 -4px 0 rgba(15, 23, 42, 0.16);
      }
      .mini-logo .left { color: #ffffff; }
      .mini-logo .right { color: #34d399; }
      h1 {
        max-width: 190px;
        margin: 0;
        color: #0f172a;
        font-size: 23px;
        line-height: 1.03;
        letter-spacing: 0;
      }
      .sub {
        max-width: 188px;
        margin: 12px 0 0;
        color: #475467;
        font-size: 12px;
        line-height: 1.45;
      }
      .diagram {
        position: absolute;
        right: 24px;
        top: 58px;
        width: 178px;
        height: 178px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.14);
        overflow: hidden;
      }
      .toolbar {
        height: 31px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 10px;
        border-bottom: 1px solid #d9dee8;
        color: #475467;
        font-size: 8px;
        font-weight: 700;
      }
      .search {
        width: 48px;
        height: 15px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #f8fafc;
      }
      .rows {
        padding: 8px 9px;
        font: 8px/1.9 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 5px;
        min-height: 16px;
        white-space: nowrap;
      }
      .key { color: #7c3aed; font-weight: 700; }
      .string { color: #047857; }
      .number { color: #1d4ed8; }
      .muted { color: #98a2b3; }
      .parse {
        display: inline-flex;
        align-items: center;
        height: 13px;
        padding: 0 4px;
        border: 1px solid #99f6e4;
        border-radius: 6px;
        color: #115e59;
        background: #ecfdf5;
        font: 700 6px/1 ui-sans-serif, system-ui, sans-serif;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        height: 13px;
        padding: 0 4px;
        border: 1px solid #fde68a;
        border-radius: 6px;
        color: #92400e;
        background: #fffbeb;
        font: 800 6px/1 ui-sans-serif, system-ui, sans-serif;
      }
      .indent-1 { padding-left: 14px; }
      .indent-2 { padding-left: 28px; }
      .callout {
        position: absolute;
        right: 130px;
        bottom: 23px;
        width: 118px;
        padding: 7px;
        border: 1px solid #bbf7d0;
        border-radius: 8px;
        color: #14532d;
        background: #f0fdf4;
        font-size: 7px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <div class="brand"><div class="mini-logo"><span><span class="left">{</span><span class="right">}</span></span></div><span>AZ JSON Explorer</span></div>
      <h1>Parse nested JSON strings with one click</h1>
      <p class="sub">Turn escaped API payloads into readable tree nodes.</p>
      <section class="diagram" aria-label="AZ JSON Explorer preview">
        <div class="toolbar"><span>api-response.json</span><div class="search"></div></div>
        <div class="rows">
          <div class="row"><span class="key">"$"</span><span class="muted">{</span></div>
          <div class="row indent-1"><span class="key">"nestedPayload"</span><span class="muted">:</span><span class="parse">Parse as JSON</span></div>
          <div class="row indent-1"><span class="badge">parsed</span><span class="muted">{</span></div>
          <div class="row indent-2"><span class="key">"customer"</span><span class="muted">:</span><span class="muted">{...}</span></div>
          <div class="row indent-2"><span class="key">"items"</span><span class="muted">:</span><span class="number">[2]</span></div>
        </div>
      </section>
    </main>
  </body>
</html>
